,\n    Vermelho: '#c23b3b', Cinza: '#77828e', Magenta: '#b842a0', Preto: '#252932',\n    Marrom: '#85552e', Bege: '#aa925f'\n  };\n\n  const input = document.getElementById('inscricao-imobiliaria');\n  const fatorSelect = document.getElementById('fator-fl');\n  const box = document.getElementById('consulta-zona-integrada');\n  if (!input || !fatorSelect || !box) return;\n\n  const status = box.querySelector('[data-zona-status]');\n  const resultado = box.querySelector('[data-zona-resultado]');\n  let autoOption = null;\n  let autoApplied = false;\n\n  input.inputMode = 'numeric';\n  input.maxLength = 15;\n  input.autocomplete = 'off';\n  input.pattern = '\\\\d{3}\\\\.\\\\d{3}\\\\.\\\\d{2}\\\\.\\\\d{4}';\n  input.title = 'Use o formato 000.000.00.0000';\n\n  function maskInscricao(raw) {\n    const digits = String(raw || '').replace(/\\D/g, '').slice(0, 12);\n    const parts = [];\n    if (digits.length > 0) parts.push(digits.slice(0, 3));\n    if (digits.length > 3) parts.push(digits.slice(3, 6));\n    if (digits.length > 6) parts.push(digits.slice(6, 8));\n    if (digits.length > 8) parts.push(digits.slice(8, 12));\n    return parts.join('.');\n  }\n\n  function normalize(value) {\n    return String(value || '')\n      .normalize('NFD')\n      .replace(/[\\u0300-\\u036f]/g, '')\n      .replace(/[^A-Z0-9]+/gi, ' ')\n      .trim()\n      .toUpperCase();\n  }\n\n  function clearAutoSelection() {\n    if (autoOption && autoOption.isConnected) autoOption.remove();\n    autoOption = null;\n    if (autoApplied) {\n      fatorSelect.value = '0';\n      fatorSelect.dispatchEvent(new Event('change', { bubbles: true }));\n    }\n    autoApplied = false;\n  }\n\n  function setStatus(text, className = 'text-muted') {\n    status.className = `zona-aviso ${className}`;\n    status.textContent = text;\n  }\n\n  function setResultHidden() {\n    resultado.hidden = true;\n    resultado.replaceChildren();\n  }\n\n  function findExistingOption(record) {\n    const [logradouro, bairro, zonaNumero] = record;\n    const rua = normalize(logradouro);\n    const bai = normalize(bairro);\n    const zona = `ZONA FISCAL ${zonaNumero}`;\n    return Array.from(fatorSelect.options).find((option) => {\n      const text = normalize(option.textContent);\n      return text.includes(rua) && text.includes(bai) && text.includes(zona);\n    }) || null;\n  }\n\n  function selectFator(record) {\n    const [logradouro, bairro, zonaNumero, zonaCor] = record;\n    const fator = FATOR_POR_ZONA[zonaNumero];\n    if (!fator) return;\n\n    if (autoOption && autoOption.isConnected) autoOption.remove();\n    autoOption = null;\n\n    const existing = findExistingOption(record);\n    if (existing) {\n      existing.selected = true;\n    } else {\n      autoOption = document.createElement('option');\n      autoOption.className = 'zona-auto-option';\n      autoOption.value = fator;\n      autoOption.textContent = `${logradouro}, BAIRRO: ${bairro}, ZONA FISCAL: ${zonaNumero} - ${zonaCor}, FL: ${fator}`;\n      fatorSelect.insertBefore(autoOption, fatorSelect.firstChild);\n      autoOption.selected = true;\n    }\n    autoApplied = true;\n    fatorSelect.dispatchEvent(new Event('change', { bubbles: true }));\n  }\n\n  function renderRecord(record) {\n    const [logradouro, bairro, zonaNumero, zonaCor] = record;\n    resultado.hidden = false;\n    resultado.innerHTML = `\n      <div class=\"zona-resumo\">\n        <div class=\"d-flex flex-wrap justify-content-between align-items-start gap-2 mb-2\">\n          <span class=\"zona-selo\"><span class=\"zona-ponto\" style=\"--zona-cor:${COR_HEX[zonaCor] || '#6c757d'}\"></span>Consulta autom\u00e1tica</span>\n          <span class=\"badge text-bg-light border\">FL ${FATOR_POR_ZONA[zonaNumero] || '\u2014'}</span>\n        </div>\n        <div class=\"zona-grid\">\n          <div class=\"zona-campo\"><small>Descri\u00e7\u00e3o do Logradouro</small><strong></strong></div>\n          <div class=\"zona-campo\"><small>Descri\u00e7\u00e3o do Bairro</small><strong></strong></div>\n          <div class=\"zona-campo\"><small>Zona Fiscal</small><strong></strong></div>\n        </div>\n      </div>`;\n    const values = resultado.querySelectorAll('.zona-campo strong');\n    values[0].textContent = logradouro || 'N\u00e3o informado';\n    values[1].textContent = bairro || 'N\u00e3o informado';\n    values[2].textContent = `${zonaNumero} - ${zonaCor}`;\n    selectFator(record);\n    setStatus('Localiza\u00e7\u00e3o e fator FL preenchidos automaticamente.', 'text-success');\n  }\n\n  function renderChoices(records) {\n    resultado.hidden = false;\n    resultado.innerHTML = `\n      <div class=\"zona-resumo zona-controles\">\n        <label for=\"zona-opcoes-integrada\" class=\"form-label mb-1\"><strong>Foram encontrados resultados alternativos</strong></label>\n        <select id=\"zona-opcoes-integrada\" class=\"form-select form-select-sm\">\n          <option value=\"\">Selecione o logradouro correspondente</option>\n        </select>\n      </div>`;\n    const select = resultado.querySelector('select');\n    records.forEach((record, index) => {\n      const [logradouro, bairro, zonaNumero, zonaCor] = record;\n      const option = document.createElement('option');\n      option.value = String(index);\n      option.textContent = `${logradouro} \u2014 ${bairro} \u2014 Zona ${zonaNumero} (${zonaCor})`;\n      select.appendChild(option);\n    });\n    select.addEventListener('change', () => {\n      const index = Number(select.value);\n      if (Number.isInteger(index) && records[index]) renderRecord(records[index]);\n    });\n    setStatus('A combina\u00e7\u00e3o setor, quadra e face possui mais de um registro. Selecione a alternativa correta.', 'text-warning');\n  }\n\n  function lookup() {\n    const masked = maskInscricao(input.value);\n    if (input.value !== masked) input.value = masked;\n\n    clearAutoSelection();\n    setResultHidden();\n\n    if (!FULL_PATTERN.test(input.value)) {\n      input.setCustomValidity(input.value ? 'Informe a inscri\u00e7\u00e3o no formato 000.000.00.0000.' : '');\n      setStatus('Digite os 12 n\u00fameros da inscri\u00e7\u00e3o. Os pontos s\u00e3o inseridos automaticamente.');\n      return;\n    }\n\n    input.setCustomValidity('');\n    const [setor, quadra, face] = input.value.split('.');\n    const records = BASE[`${setor}.${quadra}.${face}`] || [];\n\n    if (!records.length) {\n      setStatus('Inscri\u00e7\u00e3o n\u00e3o localizada na tabela. Selecione a localiza\u00e7\u00e3o manualmente.', 'text-danger');\n      return;\n    }\n\n    if (records.length === 1) renderRecord(records[0]);\n    else renderChoices(records);\n  }\n\n  input.addEventListener('input', lookup);\n  input.addEventListener('paste', (event) => {\n    event.preventDefault();\n    input.value = maskInscricao(event.clipboardData.getData('text'));\n    lookup();\n  });\n\n  lookup();\n})();\n";

  async function start() {
    try {
      const response = await fetch(ORIGINAL_URL, { cache: 'no-store' });
      if (!response.ok) throw new Error(`Falha ao carregar a base original (${response.status}).`);
      const originalHtml = await response.text();
      const doc = new DOMParser().parseFromString(originalHtml, 'text/html');

      const input = doc.getElementById('inscricao-imobiliaria');
      const factor = doc.getElementById('fator-fl');
      if (!input || !factor) throw new Error('Os campos esperados não foram encontrados no aplicativo original.');

      input.setAttribute('inputmode', 'numeric');
      input.setAttribute('maxlength', '15');
      input.setAttribute('autocomplete', 'off');
      input.setAttribute('pattern', '\d{3}\.\d{3}\.\d{2}\.\d{4}');

      const wrapper = input.closest('.mb-3') || input.parentElement;
      const box = doc.createElement('div');
      box.id = 'consulta-zona-integrada';
      box.className = 'mt-2 mb-3';
      box.innerHTML = `
        <div data-zona-status class="zona-aviso text-muted">Digite os 12 números da inscrição. Os pontos são inseridos automaticamente.</div>
        <div data-zona-resultado class="mt-2" hidden></div>`;
      wrapper.insertAdjacentElement('afterend', box);

      const style = doc.createElement('style');
      style.id = 'consulta-zona-integrada-estilos';
      style.textContent = INTEGRATION_CSS;
      doc.head.appendChild(style);

      const script = doc.createElement('script');
      script.id = 'consulta-zona-integrada-script';
      script.textContent = INTEGRATION_JS;
      doc.body.appendChild(script);

      const output = '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;
      document.open();
      document.write(output);
      document.close();
    } catch (error) {
      const message = document.getElementById('loader-message');
      if (message) {
        message.className = 'alert alert-danger';
        message.textContent = 'Não foi possível carregar a calculadora: ' + error.message;
      }
      console.error(error);
    }
  }

  start();
})();
